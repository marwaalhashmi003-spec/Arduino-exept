<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض مشاريع الأردوينو - اتحاد الطلبة</title>
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; padding: 40px 0; text-align: center; background: linear-gradient(180deg, #161b22 0%, #0b0e14 100%); border-bottom: 1px solid #30363d; }
        .container { width: 95%; max-width: 500px; margin: 20px 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; margin-bottom: 12px; padding: 15px; display: flex; align-items: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #ff9f43; background: #1c2128; }
        .icon { width: 45px; height: 45px; background: rgba(255, 159, 67, 0.1); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; margin-left: 15px; }
        .content { flex-grow: 1; }
        .content h3 { margin: 0; font-size: 16px; color: #ff9f43; }
        .content p { margin: 5px 0 0; font-size: 13px; color: #8b949e; }
        .details { display: none; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; font-size: 13px; line-height: 1.6; border-top: none; margin-top: -15px; }
    </style>
</head>
<body>
    <header>
        <h2 style="color: #ff9f43; margin: 0; font-size: 18px;">جامعة وادي الشاطئ</h2>
        <p style="color: #8b949e; margin: 5px 0 15px;">اتحاد قسم الهندسة الكهربائية والإلكترونية</p>
        <h1 style="font-size: 24px;">معرض يوم الأردوينو ⚡</h1>
    </header>
    <div class="container" id="list"></div>
    <script>
        const projects = [
            { t: "نظام الري الذكي", d: "ري تلقائي حسب الرطوبة", i: "🌱", g: "توفير المياه وحماية النباتات", a: "Arduino Uno, Soil Sensor, Pump" },
            { t: "قفاز لغة الإشارة", d: "تحويل الحركة إلى كلمات", i: "✋", g: "تسهيل تواصل الصم والبكم", a: "Arduino Nano, Flex Sensors" },
            { t: "سلة المهملات الذكية", d: "فتح آلي بدون لمس", i: "🗑️", g: "تعزيز النظافة العامة", a: "Arduino, Ultrasonic, Servo" },
            { t: "متتبع الشمس", d: "ملاحقة الضوء للألواح", i: "☀️", g: "زيادة كفاءة الطاقة الشمسية", a: "Servos, LDRs, Solar Panel" },
            { t: "رادار كشف الأجسام", d: "رسم خريطة للمحيط", i: "📡", g: "تجنب العقبات في الروبوتات", a: "Ultrasonic, Servo" },
            { t: "إنذار الحريق والغاز", d: "حماية مبكرة للمنازل", i: "🔥", g: "الأمان من التسريب والحريق", a: "MQ-2 Sensor, Buzzer" },
            { t: "البيانو الضوئي", d: "عزف بالليزر", i: "🎹", g: "وسيلة تعليمية ترفيهية", a: "Lasers, LDRs, Speaker" },
            { t: "قفل الباب بالبصمة", d: "تأمين حيوي للأبواب", i: "🔑", g: "الاستغناء عن المفاتيح", a: "Fingerprint Sensor, Solenoid" },
            { t: "محطة أرصاد", d: "قياس الجو لحظياً", i: "🌤️", g: "مراقبة المناخ في الصوبات", a: "DHT11, LCD Screen" },
            { t: "سيارة تتبع الخط", d: "روبوت مسارات محددة", i: "🏎️", g: "تعلم الذكاء الاصطناعي", a: "IR Sensors, DC Motors" }
        ];
        const list = document.getElementById('list');
        projects.forEach((p, i) => {
            list.innerHTML += `
                <div onclick="const d=document.getElementById('d'+${i}); d.style.display=(d.style.display==='block'?'none':'block')">
                    <div class="card">
                        <div class="icon">${p.i}</div>
                        <div class="content"><h3>${p.t}</h3><p>${p.d}</p></div>
                    </div>
                    <div id="d${i}" class="details"><b>الغرض:</b> ${p.g}<br><b>الأدوات:</b> ${p.a}</div>
                </div>`;
        });
    </script>
</body>
</html>
